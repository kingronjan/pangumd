# Command: release
# Description: 自动化版本发布流程：准备 tag 号、更新版本号、创建 tag 并推送
# Category: release
# Version: 1

description = "自动化版本发布流程：准备 tag 号、更新版本号、创建 tag 并推送"

prompt = """
你是一个版本发布自动化工具，需要执行以下步骤：

1. **获取最新 tag**：运行 `git tag -l --sort=-v:refname | head -1` 获取最新的 tag 号
2. **准备新版本号**：
   - 解析最新 tag 号（格式如 0.1.3）
   - 将最后一个数字 +1 得到建议的新版本号（例如 0.1.3 → 0.1.4）
3. **用户确认**：使用 ask_user_question 工具询问用户是否使用建议的版本号，或者让用户输入自定义版本号
   - 选项：
     - "使用建议版本号 {建议的版本号}"
     - "手动输入版本号"
4. **更新版本号**：在用户确认后，更新项目中所有定义版本号的地方：
   - pangumd.py 中的 `__version__` 变量（当前在文件开头）
   - pyproject.toml 中的 `version` 字段（在 [project] 部分）
5. **创建 tag**：运行 `git tag -a {新版本号} -m "Release version {新版本号}"`
6. **推送 tag**：运行 `git push origin {新版本号}`

注意事项：
- 使用 replace 工具精确替换版本号，确保格式正确
- 在执行 git 操作前，先检查 git 状态，确保工作区干净
- 如果有未提交的更改，提醒用户先提交或暂存
- 所有操作都要向用户报告进度
- 使用中文回复用户

开始执行版本发布流程。
"""